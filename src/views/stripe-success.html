<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --google-blue: #4285f4;
        --light-purple: #f3e5f5;
        --deep-purple: #7b1fa2;
        --success-green: #34a853;
      }
      body {
        font-family: 'Google Sans', sans-serif;
        background-color: #f8f9fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        text-align: center;
        max-width: 400px;
        width: 90%;
        border: 1px solid #e0e0e0;
      }
      .icon-box {
        width: 80px;
        height: 80px;
        background: var(--light-purple);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 24px;
      }
      .icon-box svg {
        width: 40px;
        height: 40px;
        fill: var(--google-blue);
      }
      h1 {
        color: #202124;
        font-size: 24px;
        margin-bottom: 12px;
        font-weight: 500;
      }
      p {
        color: #5f6368;
        font-size: 16px;
        line-height: 1.5;
        margin-bottom: 32px;
      }
      .btn {
        background-color: var(--google-blue);
        color: white;
        padding: 12px 32px;
        border-radius: 100px;
        text-decoration: none;
        font-weight: 500;
        display: inline-block;
        transition: background 0.3s ease;
      }
      .btn:hover {
        background-color: #1a73e8;
        box-shadow:
          0 1px 3px rgba(60, 64, 67, 0.3),
          0 4px 8px rgba(60, 64, 67, 0.15);
      }
      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background: var(--google-blue);
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-box">
        <svg viewBox="0 0 24 24">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
        </svg>
      </div>
      <h1>Payment Successful!</h1>
      <p>
        Your transaction has been completed successfully. You now have full
        access to your resources.
      </p>
      <a href="/" class="btn" id="redirect-btn">Back to Dashboard</a>
    </div>

    <script>
      // ৩ সেকেন্ড পর অটো রিডাইরেক্ট (অপশনাল)
      const countdown = 5;
      const btn = document.getElementById('redirect-btn');
      console.log('Payment Verified. Ready to redirect.');
    </script>
  </body>
</html>
